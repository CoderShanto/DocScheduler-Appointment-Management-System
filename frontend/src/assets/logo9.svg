<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="medicalGradient" x1="6" y1="6" x2="42" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with gradient -->
  <rect x="2" y="2" width="44" height="44" rx="12" fill="url(#medicalGradient)"/>
  
  <!-- Top highlight for depth -->
  <path d="M12 10h24a10 10 0 0 1 10 10v4c0-8-6-14-14-14H16C8 10 2 16 2 24v-4a10 10 0 0 1 10-10Z" fill="white" opacity="0.2"/>

  <!-- Medical Cross with glow -->
  <g filter="url(#glow)">
    <path
      d="M24 13c1.1 0 2 .9 2 2v6h6c1.1 0 2 .9 2 2s-.9 2-2 2h-6v6c0 1.1-.9 2-2 2s-2-.9-2-2v-6h-6c-1.1 0-2-.9-2-2s.9-2 2-2h6v-6c0-1.1.9-2 2-2Z"
      fill="#fff"
    />
  </g>
  
  <!-- Subtle inner glow -->
  <circle cx="24" cy="24" r="8" fill="white" opacity="0.1"/>
</svg>